server {
    listen 80;
    server_name localhost;

    # Laravel public directory
    root /var/www/backend/public;
    index index.php;

    # Gzip for API responses
    gzip on;
    gzip_types application/json;

    # Route everything through index.php (Laravel front controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler — passes .php requests to the app container
    location ~ \.php$ {
        fastcgi_pass app:9000;        # "app" = service name in docker-compose
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Raise limits for file uploads / long API responses
        fastcgi_read_timeout 300;
        client_max_body_size 20M;
    }

    # Don't serve .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # Static assets caching (if you serve any from Laravel public/)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}